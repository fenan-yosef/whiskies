name: CI/CD

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.5.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Run remote deploy script
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "REMOTE_DIR='${{ secrets.REMOTE_DIR }}' APP_PORT='${{ secrets.APP_PORT }}' POST_DEPLOY_COMMANDS='${{ secrets.POST_DEPLOY_COMMANDS }}' bash -s" < ./scripts/deploy.sh

      - name: Deploy Python embedding service
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "REMOTE_DIR='${{ secrets.REMOTE_DIR }}' bash -s" << 'EOF'
          set -euo pipefail

          REMOTE_DIR="${REMOTE_DIR:-/opt/whiskies}"
          SERVICE_NAME="whiskies-embedding.service"

          cd "$REMOTE_DIR"

          if [ ! -d .venv ]; then
            python3 -m venv .venv
          fi

          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r python/requirements.txt

          if command -v systemctl >/dev/null 2>&1; then
            if systemctl list-unit-files | grep -q "^${SERVICE_NAME}"; then
              (systemctl restart "$SERVICE_NAME" || sudo systemctl restart "$SERVICE_NAME")
              (systemctl --no-pager --full status "$SERVICE_NAME" || sudo systemctl --no-pager --full status "$SERVICE_NAME")
            else
              echo "${SERVICE_NAME} not found. Skipping restart (create it once on server)."
            fi
          else
            echo "systemctl unavailable on target host; skipped service restart."
          fi
          # Wait for the embedding service to become healthy (avoid race with smoke-test)
          MAX_WAIT=${MAX_WAIT:-60}
          SLEEP=${SLEEP:-2}
          echo "Waiting up to ${MAX_WAIT}s for embedding service health endpoint..."
          elapsed=0
          while [ "$elapsed" -lt "$MAX_WAIT" ]; do
            if curl -sS --fail http://127.0.0.1:8001/health >/dev/null 2>&1; then
              echo "Embedding service responded to /health"
              break
            fi
            sleep "$SLEEP"
            elapsed=$((elapsed + SLEEP))
          done
          if [ "$elapsed" -ge "$MAX_WAIT" ]; then
            echo "Embedding service did not become healthy within ${MAX_WAIT}s"
            (systemctl --no-pager --full status "$SERVICE_NAME" || sudo systemctl --no-pager --full status "$SERVICE_NAME") || true
            exit 1
          fi
          EOF

      - name: Verify login endpoint
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "APP_PORT='${{ secrets.APP_PORT }}' bash -s" << 'EOF'
          set -euo pipefail

          APP_PORT="${APP_PORT:-3002}"
          # The login page should return 200 OK
          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}" "http://127.0.0.1:${APP_PORT}/login")

          if [ "$STATUS_CODE" != "200" ]; then
            echo "Login page check failed with HTTP ${STATUS_CODE}"
            exit 1
          fi

          echo "Login page is accessible"
          EOF
